    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    color: #333;
    margin: 0;
    padding: 20px;
}

h1 {
    font-size: 2rem;
}

.btn {
    padding: 12px 20px;
    font-size: 16px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#yesBtn {
    background: #28a745;
    color: white;
}

#noBtn {
    background: #dc3545;
    color: white;
    position: fixed;
}

#message, #puzzleSection, #scratchSection {
    display: none;
    margin-top: 20px;
}

canvas {
    width: 90%;
    max-width: 300px;
    height: auto;
    border: 2px solid #fff;
    margin-top: 20px;
}

.container {
    max-width: 400px;
    margin: auto;
}
</style>
</head>

<body>

<div class="container">

<h1>Hey 😊</h1>
<h3>I have something to ask you...</h3>

<div id="question">
    <h3>Do you wanna date me? ❤️</h3>
    <button id="yesBtn" class="btn">Yes 😍</button>
    <button id="noBtn" class="btn">No 😅</button>
</div>

<div id="message">
    <h2>Yayyy!!! ❤️🥳</h2>
    <p>You just made my day... actually my whole life better 😄</p>
    <p>Get ready for lots of smiles, bad jokes & good memories 💫</p>
    <button onclick="showPuzzle()">Next Surprise 🎁</button>
</div>

<div id="puzzleSection">
    <h3>Let's solve our little puzzle 🧩</h3>
    <canvas id="puzzleCanvas" width="300" height="300"></canvas>
    <button onclick="showScratch()">Final Surprise ✨</button>
</div>

<div id="scratchSection">
    <h3>Scratch to reveal 💖</h3>
    <canvas id="scratchCanvas" width="300" height="150"></canvas>
    <p>Hint: Use your finger 😉</p>
</div>

</div>

<script>
/* --- NO BUTTON (MOBILE SAFE) --- */
const noBtn = document.getElementById("noBtn");

function moveNoButton() {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 100);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("touchstart", moveNoButton);
noBtn.addEventListener("mouseover", moveNoButton);

/* --- YES BUTTON --- */
document.getElementById("yesBtn").onclick = function() {
    document.getElementById("question").style.display = "none";
    document.getElementById("message").style.display = "block";
};

/* --- PUZZLE --- */
function showPuzzle() {
    document.getElementById("message").style.display = "none";
    document.getElementById("puzzleSection").style.display = "block";
    drawPuzzle();
}

function drawPuzzle() {
    const canvas = document.getElementById("puzzleCanvas");
    const ctx = canvas.getContext("2d");

    const img = new Image();
    img.src = "https://via.placeholder.com/300"; // replace with your image

    img.onload = function() {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    };
}

/* --- SCRATCH CARD (TOUCH SUPPORT) --- */
function showScratch() {
    document.getElementById("puzzleSection").style.display = "none";
    document.getElementById("scratchSection").style.display = "block";
    initScratch();
}

function initScratch() {
    const canvas = document.getElementById("scratchCanvas");
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "#999";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.globalCompositeOperation = "destination-out";

    function scratch(x, y) {
        ctx.beginPath();
        ctx.arc(x, y, 15, 0, Math.PI * 2);
        ctx.fill();
    }

    // Mouse
    canvas.addEventListener("mousemove", (e) => {
        if (e.buttons === 1) {
            const rect = canvas.getBoundingClientRect();
            scratch(e.clientX - rect.left, e.clientY - rect.top);
        }
    });

    // Touch
    canvas.addEventListener("touchmove", (e) => {
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        scratch(touch.clientX - rect.left, touch.clientY - rect.top);
    });

    // Message
    ctx.globalCompositeOperation = "source-over";
    ctx.font = "18px Arial";
    ctx.fillStyle = "black";
    ctx.fillText("I ❤️ You", 90, 80);
}
</script>

</body>
</html>
