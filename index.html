<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    overflow: hidden;
}

/* Intro */
#intro {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* Sections */
.section { display: none; text-align:center; padding:20px;}
.active { display:block; }

/* Chat */
.chat-box {
    max-width: 350px;
    margin: auto;
    background: #111;
    border-radius: 15px;
    padding: 10px;
}
.msg {
    background: #262626;
    padding: 10px;
    border-radius: 10px;
    margin: 6px;
}

/* Buttons */
button {
    padding: 12px 20px;
    margin: 10px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}
.yes { background: #ff4d6d; color:white; }
.no { background: #444; color:white; position:fixed; }

/* Game */
#gameArea {
    height: 300px;
    background: #111;
    border-radius: 10px;
    position: relative;
    overflow: hidden;
}
.heart {
    position: absolute;
    font-size: 24px;
    cursor: pointer;
}

/* Floating bg hearts */
.bgHeart {
    position: fixed;
    animation: floatUp 6s linear infinite;
}
@keyframes floatUp {
    0% {transform:translateY(100vh);opacity:0;}
    50% {opacity:1;}
    100% {transform:translateY(-10vh);opacity:0;}
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="https://www.learningcontainer.com/wp-content/uploads/2020/02/Kalimba.mp3" type="audio/mpeg">
</audio>

<!-- INTRO -->
<div id="intro">
    <h2>Hey... I made something for you ❤️</h2>
    <button onclick="startExperience()">Tap to Enter ✨</button>
</div>

<!-- Chat -->
<div class="section" id="s2">
    <div class="chat-box" id="chatBox"></div>
</div>

<!-- Trick -->
<div class="section" id="s3">
    <h3>Try saying NO 😏</h3>
    <button class="yes" onclick="next(4)">Okay 😄</button>
    <button class="no" id="noBtn">No 😅</button>
</div>

<!-- Proposal -->
<div class="section" id="s4">
    <h2>Do you wanna go on a date with me? ❤️</h2>
    <button class="yes" onclick="next(5)">Yes 😍</button>
</div>

<!-- Coming -->
<div class="section" id="s5">
    <h2>Date coming soon... 💖</h2>
</div>

<!-- Game -->
<div class="section" id="s6">
    <h3>Catch the hearts 💖</h3>
    <div id="gameArea"></div>
    <p id="score">Score: 0</p>
</div>

<!-- Final -->
<div class="section" id="s7">
    <h2>One last thing… 💖</h2>
    <p>
    Na plan tha… na intention tha…<br><br>
    Bas tum mile… aur sab special lagne laga ❤️<br><br>
    Shayad thoda zyada hi pasand aa gaye ho tum…
    </p>
</div>

<script>

/* Start */
function startExperience(){
    document.getElementById("intro").style.display="none";
    document.getElementById("music").play(); // guaranteed after click
    next(2);
    startBgHearts();
}

/* Navigation */
function next(n){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById("s"+n).classList.add("active");

    if(n===2){
        document.getElementById("chatBox").innerHTML="";
        startChat();
    }

    if(n===5){
        setTimeout(()=>{
            next(6);
            startGame(); // start game ONLY when visible
        },2000);
    }
}

/* Chat */
const messages=[
"Hey 😊",
"Ek baat bolu…",
"Tumse baat karna… acha lagta hai",
"Bina reason smile aa jati hai",
"And you’re becoming special ❤️"
];

function typeMessage(text,cb){
    let box=document.getElementById("chatBox");
    let div=document.createElement("div");
    div.className="msg";
    box.appendChild(div);

    let i=0;
    let t=setInterval(()=>{
        div.innerHTML+=text[i++];
        if(i>=text.length){
            clearInterval(t);
            if(cb)setTimeout(cb,600);
        }
    },40);
}

function startChat(){
    let i=0;
    function nextMsg(){
        if(i<messages.length){
            typeMessage(messages[i],nextMsg);
            i++;
        } else setTimeout(()=>next(3),1000);
    }
    nextMsg();
}

/* Moving NO */
let noBtn=document.getElementById("noBtn");
noBtn.addEventListener("mouseover",()=>{
    noBtn.style.left=Math.random()*window.innerWidth+"px";
    noBtn.style.top=Math.random()*window.innerHeight+"px";
});

/* GAME FIX */
let score=0;
let gameInterval;

function startGame(){
    score=0;
    document.getElementById("score").innerText="Score: 0";
    let gameArea=document.getElementById("gameArea");

    gameInterval=setInterval(()=>{
        let h=document.createElement("div");
        h.innerHTML="❤️";
        h.className="heart";
        h.style.left=Math.random()*90+"%";
        h.style.top="0px";

        h.onclick=function(){
            score++;
            document.getElementById("score").innerText="Score: "+score;
            h.remove();
            if(score>=10){
                clearInterval(gameInterval);
                next(7);
            }
        };

        gameArea.appendChild(h);

        let fall=setInterval(()=>{
            let top=parseInt(h.style.top);
            if(top>280){
                h.remove();
                clearInterval(fall);
            } else {
                h.style.top=(top+5)+"px";
            }
        },50);

    },800);
}

/* Background hearts */
function startBgHearts(){
    setInterval(()=>{
        let h=document.createElement("div");
        h.innerHTML="❤️";
        h.className="bgHeart";
        h.style.left=Math.random()*100+"%";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),6000);
    },400);
}

</script>

</body>
</html>
